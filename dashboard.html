<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Srivachav STAY SAFE | User Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .dashboard-layout {
            display: grid;
            grid-template-columns: 250px 1fr;
            gap: 30px;
            margin-top: 100px;
        }

        .sidebar-menu {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .sidebar-menu a {
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            transition: var(--transition);
        }

        .sidebar-menu a:hover, .sidebar-menu a.active {
            background: rgba(107, 70, 193, 0.1);
            color: var(--primary);
            font-weight: 600;
        }

        .profile-card {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 24px;
            margin-bottom: 30px;
        }

        .avatar {
            width: 80px; height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            display: flex; align-items: center; justify-content: center;
            font-size: 2rem; font-weight: bold;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            padding: 20px;
            text-align: center;
        }

        .stat-card h2 {
            font-size: 2rem;
            color: var(--primary);
            margin-bottom: 8px;
        }

        @media (max-width: 768px) {
            .dashboard-layout { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="nav-brand">STAY SAFE</a>
        <div class="mobile-toggle">MENU</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="listings.html">Explore</a>
            <a href="dashboard.html" class="active">Dashboard</a>
            <div class="profile-btn" id="navAvatar">A</div>
        </div>
    </nav>

    <div class="container animate-slide-up">
        <div class="dashboard-layout">
            <aside class="sidebar-menu glass-panel" style="padding: 24px; height: fit-content;">
                <h3 style="margin-bottom: 20px;">My Account</h3>
                <a href="dashboard.html" class="active">Overview & Bookings</a>
                <a href="transactions.html">Transactions & Rent</a>
                <a href="#">Roommate Matches</a>
                <a href="#">Support Chat</a>
            </aside>

            <main>
                <!-- Profile -->
                <div class="profile-card glass-panel">
                    <div class="avatar" id="mainAvatar">A</div>
                    <div>
                        <h2 id="userName">User Name</h2>
                        <p style="color: var(--text-muted);" id="userEmail">user@example.com</p>
                        <div style="margin-top: 8px;">
                            <span class="badge badge-verified">✓ KYC Verified</span>
                        </div>
                    </div>
                </div>

                <!-- Stats -->
                <div class="stats-grid">
                    <div class="stat-card glass-panel">
                        <h2 id="activeBookingsStat">0</h2>
                        <p>Active Bookings</p>
                    </div>
                    <div class="stat-card glass-panel">
                        <h2 id="savedPropsStat">0</h2>
                        <p>Saved Properties</p>
                    </div>
                </div>

                <!-- Active Bookings -->
                <h3 style="margin-bottom: 20px;">Current Stay</h3>
                <div id="activeBookings" style="margin-bottom: 40px;">
                    <!-- JS Injected -->
                </div>

                <!-- Saved Properties -->
                <h3 style="margin-bottom: 20px;">Saved Properties</h3>
                <div class="property-grid" id="savedGrid">
                    <!-- JS Injected -->
                </div>
            </main>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Load User Info
            const usersStr = localStorage.getItem('1268_users');
            if(usersStr) {
                const users = JSON.parse(usersStr);
                const user = users.current;
                document.getElementById('userName').innerText = user.name;
                document.getElementById('userEmail').innerText = user.email;
                const initial = user.name.charAt(0).toUpperCase();
                document.getElementById('mainAvatar').innerText = initial;
                document.getElementById('navAvatar').innerText = initial;
            }

            // Load Active Booking (Derive from transactions)
            const txs = JSON.parse(localStorage.getItem('1268_transactions')) || [];
            const bookingContainer = document.getElementById('activeBookings');
            
            // Assume the latest valid transaction is the active booking
            const activeTx = txs.length > 0 ? txs[0] : null;

            if(activeTx) {
                const prop = getPropertyById(activeTx.propertyId);
                document.getElementById('activeBookingsStat').innerText = '1';
                
                if(prop) {
                    bookingContainer.innerHTML = `
                        <div class="glass-panel" style="padding: 24px; display: flex; gap: 24px; align-items: center;">
                            <img src="${prop.images[0]}" style="width: 150px; height: 100px; object-fit: cover; border-radius: var(--radius-sm);">
                            <div style="flex: 1;">
                                <div class="d-flex justify-between aligns-center">
                                    <h3>${prop.name}</h3>
                                    <span class="badge badge-success" style="background: rgba(72,187,120,0.1); color: #38a169;">Active</span>
                                </div>
                                <p style="color: var(--text-muted); margin: 8px 0;"> ${prop.location}</p>
                                <div class="d-flex justify-between aligns-center" style="margin-top: 16px;">
                                    <button class="btn btn-outline" style="padding: 8px 16px;">Contact Owner</button>
                                    <button class="btn btn-primary" style="padding: 8px 16px;" onclick="window.location.href='transactions.html'">Pay Rent</button>
                                </div>
                            </div>
                        </div>
                    `;
                }
            } else {
                bookingContainer.innerHTML = `
                    <div class="glass-panel" style="padding: 40px; text-align: center; color: var(--text-muted);">
                        No active stays right now. <br><br>
                        <a href="listings.html" class="btn btn-primary">Find a Place</a>
                    </div>
                `;
            }

            // Load Saved Properties
            const savedIds = JSON.parse(localStorage.getItem('1268_saved')) || [];
            document.getElementById('savedPropsStat').innerText = savedIds.length;
            const savedGrid = document.getElementById('savedGrid');

            if(savedIds.length === 0) {
                savedGrid.innerHTML = `
                    <div style="grid-column: 1/-1; color: var(--text-muted); padding: 20px; text-align: center;">
                        You haven't saved any properties yet.
                    </div>
                `;
            } else {
                const savedProps = savedIds.map(id => getPropertyById(id)).filter(p => p !== undefined);
                
                savedGrid.innerHTML = savedProps.map(p => `
                    <div class="property-card glass-panel" style="animation: fadeIn 0.4s ease-out">
                        <div class="card-img">
                            <img src="${p.images[0]}" alt="${p.name}">
                            <div class="badge bg-white pos-top-right" style="cursor: pointer;" onclick="removeSaved('${p.id}', this)">REMOVE Remove</div>
                        </div>
                        <div class="card-content">
                            <h3>${p.name}</h3>
                            <p class="location-text"> ${p.location}</p>
                            <div class="card-footer d-flex justify-between aligns-center">
                                <div class="price">
                                    <strong>${formatCurrency(p.price)}</strong> / mo
                                </div>
                                <a href="details.html?id=${p.id}" class="btn btn-outline" style="padding: 6px 12px; font-size: 0.9rem;">View</a>
                            </div>
                        </div>
                    </div>
                `).join('');
            }
        });

        // Make remove function globally accessible to onclick
        window.removeSaved = function(id, el) {
            let saved = JSON.parse(localStorage.getItem('1268_saved')) || [];
            saved = saved.filter(savedId => savedId !== id);
            localStorage.setItem('1268_saved', JSON.stringify(saved));
            
            // Remove DOM element intuitively
            const card = el.closest('.property-card');
            card.style.opacity = '0';
            setTimeout(() => {
                card.remove();
                // update count
                document.getElementById('savedPropsStat').innerText = saved.length;
            }, 300);
            
            showToast("Property removed.");
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Srivachav STAY SAFE | Property Details</title>
    <link rel="stylesheet" href="style.css">
    
    <!-- 360 Panorama Dependencies (Pannellum JS) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css">
    <script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
    <style>
        .gallery-section {
            display: grid;
            grid-template-columns: 2fr 1fr;
            grid-template-rows: 250px 250px;
            gap: 15px;
            margin-top: 100px;
            margin-bottom: 40px;
            overflow: hidden;
            border-radius: var(--radius-lg);
        }
        .gallery-main {
            grid-row: 1 / -1;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .gallery-sub {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: relative;
        }
        .gallery-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }
        .gallery-overlay:hover { background: rgba(0,0,0,0.3); }

        .details-layout {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 40px;
        }
        
        .amenities-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 16px;
            margin: 24px 0;
        }
        .amenity-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px;
            background: var(--white);
            border-radius: var(--radius-sm);
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
            border: 1px solid rgba(0,0,0,0.05);
        }

        .booking-widget {
            position: sticky;
            top: 100px;
            padding: 30px;
            border-radius: var(--radius-lg);
            text-align: left;
        }
        .price-big {
            font-size: 2rem;
            color: var(--primary);
            font-weight: 700;
        }
        .urgency-text {
            color: #dd6b20;
            font-weight: 600;
            margin-top: 10px;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .reviews-list {
            margin-top: 30px;
        }
        .review-card {
            padding: 16px;
            border-bottom: 1px solid rgba(0,0,0,0.1);
        }

        @media (max-width: 900px) {
            .details-layout {
                grid-template-columns: 1fr;
            }
            .gallery-section {
                grid-template-columns: 1fr;
                grid-template-rows: auto;
            }
            .gallery-sub { display: none; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="nav-brand">STAY SAFE</a>
        <div class="mobile-toggle">MENU</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="listings.html">Explore</a>
            <a href="dashboard.html">Dashboard</a>
        </div>
    </nav>

    <div class="container" id="detailsContainer">
        <!-- Injected via JS -->
    </div>

    <!-- Lightbox Modal -->
    <div id="lightboxModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 3000; align-items: center; justify-content: center; backdrop-filter: blur(5px);">
        <button onclick="closeLightbox()" style="position: absolute; top: 20px; right: 30px; background: none; border: none; color: white; font-size: 2.5rem; cursor: pointer;">&times;</button>
        <img id="lightboxImg" src="" style="max-width: 90%; max-height: 90%; border-radius: 4px; box-shadow: 0 20px 50px rgba(0,0,0,0.5);">
    </div>

    <!-- 360 Panorama Modal -->
    <div id="panoramaModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 3000; flex-direction: column;">
        <div style="padding: 20px; display: flex; justify-content: space-between; align-items: center; background: #000;">
            <h3 style="color: white; font-weight: 500;">Interactive 360° Virtual Tour</h3>
            <button onclick="close360()" class="btn btn-outline" style="border-color: rgba(255,255,255,0.3); color: white;">Close Viewer</button>
        </div>
        <div id="panoramaContainer" style="width: 100%; flex: 1;"></div>
    </div>

    <!-- Booking Modal (Slide up) -->
    <div id="bookingModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 2000; align-items: flex-end; justify-content: center;">
        <div class="glass-panel animate-slide-up" style="width: 100%; max-width: 500px; padding: 40px; border-radius: 24px 24px 0 0; background: var(--white);">
            <h3>Select Move-in Date</h3>
            <p class="location-text" style="margin-bottom: 24px;" id="modalPropName">Property</p>
            
            <input type="date" id="moveInDate" style="width: 100%; padding: 12px; margin-bottom: 24px; border: 1px solid #ccc; border-radius: 8px; font-size: 1rem;">
            
            <div class="d-flex justify-between" style="gap: 16px;">
                <button class="btn btn-outline" style="flex: 1;" onclick="closeModal()">Cancel</button>
                <button class="btn btn-primary" style="flex: 1;" onclick="proceedToPayment()">Confirm Dates</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        let currentProp = null;

        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');
            const prop = getPropertyById(id);
            const container = document.getElementById('detailsContainer');

            if(!prop) {
                container.innerHTML = '<div style="margin-top: 150px; text-align: center;"><h2>Property not found!</h2><a href="listings.html">Go back</a></div>';
                return;
            }
            
            currentProp = prop;

            const secondImage = prop.images.length > 1 ? prop.images[1] : prop.images[0];

            container.innerHTML = `
                <div class="gallery-section animate-slide-up">
                    <img src="${prop.images[0]}" alt="Main" class="gallery-main" style="cursor: zoom-in;" onclick="openLightbox('${prop.images[0]}')">
                    <div style="position: relative; height: 100%;">
                        <img src="${secondImage}" alt="Sub" class="gallery-sub" style="border-radius: 0 var(--radius-lg) 0 0; cursor: zoom-in;" onclick="openLightbox('${secondImage}')">
                    </div>
                    <div style="position: relative; height: 100%;">
                        <img src="${prop.images[0]}" alt="Sub" class="gallery-sub" style="border-radius: 0 0 var(--radius-lg) 0; filter: brightness(0.7);">
                        <div class="gallery-overlay" onclick="open360()">
                            <span style="font-size: 1.2rem;">VIEW 360° Preview</span>
                        </div>
                    </div>
                </div>

                <div class="details-layout">
                    <div class="info-section">
                        <div class="d-flex justify-between aligns-center" style="margin-bottom: 16px;">
                            <h1 style="font-size: 2.5rem; line-height: 1.2;">${prop.name}</h1>
                            <div class="save-btn" style="cursor: pointer; font-size: 1.5rem;" onclick="saveProperty('${prop.id}')" title="Save">SAVE</div>
                        </div>
                        <p class="location-text" style="font-size: 1.1rem;"> ${prop.location}</p>
                        
                        <div style="display: flex; gap: 10px; margin-bottom: 24px;">
                            ${prop.verified ? '<span class="badge badge-verified">VERIFIED KYC Verified Host</span>' : ''}
                            <span class="badge">RATING  ${prop.rating} (${prop.reviews} reviews)</span>
                        </div>

                        <h3>About this space</h3>
                        <p style="color: var(--text-muted); line-height: 1.7; margin: 16px 0 32px;">${prop.description}</p>

                        <h3>What this place offers</h3>
                        <div class="amenities-grid">
                            ${prop.amenities.map(a => `
                                <div class="amenity-item">
                                    <span style="color: var(--primary);">✓</span> ${a}
                                </div>
                            `).join('')}
                        </div>

                        <h3 style="margin-top: 40px;">Location</h3>
                        <div style="width: 100%; height: 300px; background: #e2e8f0; border-radius: var(--radius-lg); margin-top: 16px; display: flex; align-items: center; justify-content: center; color: var(--text-muted);">
                            Google Maps Integration Overlay (Simulated)
                        </div>

                        <h3 style="margin-top: 40px;">Reviews</h3>
                        <div class="reviews-list">
                            <div class="review-card">
                                <strong>Rahul M.</strong> <span class="rating">RATING RATING RATING RATING RATING </span>
                                <p style="color: var(--text-muted); margin-top: 8px;">Great place, very clean and safe. The food quality is amazing and staff is very polite.</p>
                            </div>
                            <div class="review-card">
                                <strong>Aditi S.</strong> <span class="rating">RATING RATING RATING RATING </span>
                                <p style="color: var(--text-muted); margin-top: 8px;">Nice location and decent WiFi speed. Highly recommend for students.</p>
                            </div>
                        </div>
                    </div>

                    <div>
                        <div class="booking-widget glass-panel">
                            <div class="price-big">${formatCurrency(prop.price)} <span style="font-size: 1rem; color: var(--text-muted); font-weight: 400;">/ month</span></div>
                            
                            ${prop.roomsLeft <= 3 ? `
                                <div class="urgency-text">
                                    URGENT Hurry! Only ${prop.roomsLeft} rooms left.
                                </div>
                            ` : `<div class="urgency-text" style="color: #48bb78;">Available Move-in</div>`}

                            <hr style="margin: 24px 0; border: none; border-top: 1px solid rgba(0,0,0,0.1);">
                            
                            <div style="margin-bottom: 24px;">
                                <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                                    <span style="color: var(--text-muted);">Security Deposit</span>
                                    <span>${formatCurrency(prop.price * 2)}</span>
                                </div>
                                <div style="display: flex; justify-content: space-between; font-weight: 600; margin-top: 16px; padding-top: 16px; border-top: 1px dashed #ccc;">
                                    <span>Total Due at Move-in</span>
                                    <span>${formatCurrency(prop.price * 3)}</span>
                                </div>
                            </div>

                            <button class="btn btn-primary" style="width: 100%; font-size: 1.1rem; padding: 16px;" onclick="openModal()">Book Room Now</button>
                            
                            <div style="text-align: center; margin-top: 16px; font-size: 0.85rem; color: var(--text-muted);">
                                You won't be charged yet.
                            </div>
                        </div>
                    </div>
                </div>
            `;
        });

        function saveProperty(id) {
            let saved = JSON.parse(localStorage.getItem('1268_saved')) || [];
            if(!saved.includes(id)) {
                saved.push(id);
                localStorage.setItem('1268_saved', JSON.stringify(saved));
                showToast("Property saved to Dashboard!");
            } else {
                showToast("Property is already saved.", "error");
            }
        }

        const modal = document.getElementById('bookingModal');
        
        function openModal() {
            document.getElementById('modalPropName').innerText = currentProp.name;
            // set min date to today
            document.getElementById('moveInDate').min = new Date().toISOString().split("T")[0];
            modal.style.display = 'flex';
        }
        function closeModal() {
            modal.style.display = 'none';
        }
        
        function proceedToPayment() {
            const date = document.getElementById('moveInDate').value;
            if(!date) {
                showToast("Please select a move-in date.", "error");
                return;
            }
            // Temporarily store booking intent
            localStorage.setItem('1268_intent', JSON.stringify({
                propertyId: currentProp.id,
                date: date,
                amount: currentProp.price
            }));
            
            window.location.href = `payment.html`;
            window.location.href = `payment.html`;
        }

        // Media Viewer API
        let viewer = null;
        
        function openLightbox(url) {
            document.getElementById('lightboxImg').src = url;
            document.getElementById('lightboxModal').style.display = 'flex';
        }

        function closeLightbox() {
            document.getElementById('lightboxModal').style.display = 'none';
        }

        function open360() {
            document.getElementById('panoramaModal').style.display = 'flex';
            if(!viewer) {
                viewer = pannellum.viewer('panoramaContainer', {
                    "type": "equirectangular",
                    "panorama": "https://pannellum.org/images/alma.jpg",
                    "autoLoad": true,
                    "compass": true,
                    "preview": "https://pannellum.org/images/alma.jpg"
                });
            }
        }

        function close360() {
            document.getElementById('panoramaModal').style.display = 'none';
        }
    </script>
</body>
</html>

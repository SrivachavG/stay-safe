<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Srivachav STAY SAFE | Transactions</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .tx-layout {
            display: grid;
            grid-template-columns: 250px 1fr;
            gap: 30px;
            margin-top: 100px;
        }

        .sidebar-menu {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .sidebar-menu a {
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            transition: var(--transition);
        }

        .sidebar-menu a:hover, .sidebar-menu a.active {
            background: rgba(107, 70, 193, 0.1);
            color: var(--primary);
            font-weight: 600;
        }

        .tx-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .tx-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            border-radius: var(--radius-md);
            background: var(--white);
            box-shadow: var(--shadow-soft);
            transition: transform 0.2s;
        }

        .tx-item:hover {
            transform: translateX(5px);
            border-left: 4px solid var(--primary);
        }

        .tx-info h4 {
            margin-bottom: 4px;
        }
        .tx-info p {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .tx-amount {
            text-align: right;
        }
        .tx-amount .amount {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 4px;
        }
        .badge-success { background: rgba(72,187,120,0.1); color: #38a169; }

        @media (max-width: 768px) {
            .tx-layout { grid-template-columns: 1fr; }
            .tx-item { flex-direction: column; align-items: flex-start; gap: 16px;}
            .tx-amount { text-align: left; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="nav-brand">STAY SAFE</a>
        <div class="mobile-toggle">MENU</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="listings.html">Explore</a>
            <a href="dashboard.html" class="active">Dashboard</a>
        </div>
    </nav>

    <div class="container animate-slide-up">
        <div class="tx-layout">
            <aside class="sidebar-menu glass-panel" style="padding: 24px; height: fit-content;">
                <h3 style="margin-bottom: 20px;">My Account</h3>
                <a href="dashboard.html">Overview & Bookings</a>
                <a href="transactions.html" class="active">Transactions & Rent</a>
                <a href="matches.html">Roommate Matches</a>
                <a href="support.html">Support Chat</a>
                <a href="settings.html">Settings</a>
                <div style="height:1px;background:rgba(0,0,0,0.08);margin:8px 0;"></div>
                <div style="color:#e53e3e;cursor:pointer;padding:12px 16px;border-radius:4px;font-size:0.92rem;font-weight:500;" onclick="logoutUser()">Logout</div>
            </aside>

            <main>
                <div class="d-flex justify-between aligns-center" style="margin-bottom: 30px;">
                    <h2>Payment History</h2>
                    <span class="badge" style="font-size: 0.9rem;" id="txCount">0 records</span>
                </div>

                <div class="tx-list" id="txContainer">
                    <!-- JS fills this -->
                </div>
            </main>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const txs = JSON.parse(localStorage.getItem('1268_transactions')) || [];
            const container = document.getElementById('txContainer');
            
            document.getElementById('txCount').innerText = `${txs.length} records`;

            if(txs.length === 0) {
                container.innerHTML = `
                    <div style="text-align: center; padding: 40px; background: rgba(255,255,255,0.5); border-radius: 12px; border: 1px dashed #ccc;">
                        <span style="font-size: 3rem;">NO RECORDS</span>
                        <h3 style="margin-top: 16px;">No transactions yet</h3>
                        <p style="color: var(--text-muted); margin-top: 8px;">Your payment history will appear here once you make a booking.</p>
                        <a href="listings.html" class="btn btn-primary" style="margin-top: 24px;">Explore Properties</a>
                    </div>
                `;
                return;
            }

            container.innerHTML = txs.map(tx => {
                const dateObj = new Date(tx.date);
                const dateStr = dateObj.toLocaleDateString('en-IN', { year: 'numeric', month: 'short', day: 'numeric' });
                const timeStr = dateObj.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });

                return `
                    <div class="tx-item">
                        <div class="tx-info">
                            <h4>${tx.propertyName}</h4>
                            <p>TXN: ${tx.id} • ${dateStr} ${timeStr}</p>
                            <p style="margin-top: 4px;">Method: <strong>${tx.method}</strong></p>
                        </div>
                        <div class="tx-amount">
                            <div class="amount">${formatCurrency(tx.amount)}</div>
                            <span class="badge badge-success">✓ ${tx.status}</span>
                            <div style="margin-top: 8px;">
                                <button class="btn btn-outline" style="padding: 4px 12px; font-size: 0.8rem; background: var(--white);" onclick="downloadInvoice('${tx.id}')">Download Invoice</button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        });

        function downloadInvoice(id) {
            showToast(`Generating invoice for ${id}...`);
            setTimeout(() => {
                showToast(`Invoice ${id}.pdf downloaded successfully!`);
            }, 1000);
        }
    </script>
</body>
</html>

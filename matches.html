    <style>
        .dashboard-layout {
            display: grid;
            grid-template-columns: 250px 1fr;
            gap: 30px;
            margin-top: 100px;
        }

        .sidebar-menu {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .sidebar-menu a {
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            transition: var(--transition);
        }

        .sidebar-menu a:hover, .sidebar-menu a.active {
            background: rgba(107, 70, 193, 0.1);
            color: var(--primary);
            font-weight: 600;
        }

        /* Match Grid specific */
        .match-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }

        .match-card {
            padding: 0;
            overflow: hidden;
            text-align: center;
        }

        .match-img {
            height: 250px;
            background: #eee;
            position: relative;
        }

        .match-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(10%);
        }

        .match-percent {
            position: absolute;
            top: 16px;
            right: 16px;
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            backdrop-filter: blur(5px);
        }

        .match-info {
            padding: 24px;
        }

        .match-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            justify-content: center;
            margin: 16px 0;
        }

        .match-tag {
            font-size: 0.7rem;
            padding: 4px 10px;
            border: 1px solid #eaeaea;
            border-radius: 12px;
            color: var(--text-muted);
        }

        @media (max-width: 768px) {
            .dashboard-layout { grid-template-columns: 1fr; }
        }
    </style>
</head>

        matches.sort((a, b) => b.percent - a.percent);

        document.addEventListener('DOMContentLoaded', () => {
            const usersStr = localStorage.getItem('1268_users');
            if(usersStr) {
                const users = JSON.parse(usersStr);
                const initial = users.current.name.charAt(0).toUpperCase();
                document.getElementById('navAvatar').innerText = initial;
            }

            const grid = document.getElementById('matchGrid');
            grid.innerHTML = matches.map(m => `
                <div class="match-card glass-panel" id="${m.id}">
                    <div class="match-img">
                        <img src="${m.img}" alt="${m.name}">
                        <div class="match-percent">${m.percent}% Match</div>
                    </div>
                    <div class="match-info">
                        <h3 style="font-size: 1.3rem; margin-bottom: 4px;">${m.name}, ${m.age}</h3>
                        <p style="color: var(--text-muted); font-size: 0.9rem;">${m.role}</p>
                        
                        <div class="match-tags">
                            ${m.tags.map(t => `<span class="match-tag">${t}</span>`).join('')}
                        </div>
                        
                        <button class="btn btn-outline" style="width: 100%; border-radius: 24px; padding: 12px;" onclick="connectMatch('${m.id}')">Connect Request</button>
                    </div>
                </div>
            `).join('');
        });

        window.connectMatch = function(id) {
            const btn = document.querySelector(`#${id} button`);
            btn.innerHTML = 'Request Sent ✓';
            btn.className = 'btn btn-primary';
            btn.disabled = true;
            btn.style.opacity = '0.8';
            if (typeof showToast === 'function') showToast("Connection request sent successfully!", "success");

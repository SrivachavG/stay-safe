<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Srivachav STAY SAFE | Roommate Matches</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .dashboard-layout {
            display: grid;
            grid-template-columns: 250px 1fr;
            gap: 30px;
            margin-top: 100px;
        }

        .sidebar-menu {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .sidebar-menu a {
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            transition: var(--transition);
        }

        .sidebar-menu a:hover, .sidebar-menu a.active {
            background: rgba(107, 70, 193, 0.1);
            color: var(--primary);
            font-weight: 600;
        }

        /* Match Grid specific */
        .match-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }

        .match-card {
            padding: 0;
            overflow: hidden;
            text-align: center;
        }

        .match-img {
            height: 250px;
            background: #eee;
            position: relative;
        }

        .match-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(10%);
        }

        .match-percent {
            position: absolute;
            top: 16px;
            right: 16px;
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            backdrop-filter: blur(5px);
        }

        .match-info {
            padding: 24px;
        }

        .match-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            justify-content: center;
            margin: 16px 0;
        }

        .match-tag {
            font-size: 0.7rem;
            padding: 4px 10px;
            border: 1px solid #eaeaea;
            border-radius: 12px;
            color: var(--text-muted);
        }

        @media (max-width: 768px) {
            .dashboard-layout { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="nav-brand">STAY SAFE</a>
        <div class="mobile-toggle">MENU</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="listings.html">Explore</a>
            <a href="dashboard.html" class="active">Dashboard</a>
            <div class="profile-btn" id="navAvatar">A</div>
        </div>
    </nav>

    <div class="container animate-slide-up">
        <div class="dashboard-layout">
            <aside class="sidebar-menu glass-panel" style="padding: 24px; height: fit-content;">
                <h3 style="margin-bottom: 20px;">My Account</h3>
                <a href="dashboard.html">Overview & Bookings</a>
                <a href="transactions.html">Transactions & Rent</a>
                <a href="matches.html" class="active">Roommate Matches</a>
                <a href="support.html">Support Chat</a>
            </aside>

            <main>
                <div style="margin-bottom: 40px;">
                    <h2 class="section-title" style="margin-bottom: 12px; font-size: 2rem;">Find Your Vibe.</h2>
                    <p style="color: var(--text-muted);">We've analyzed your lifestyle preferences to find the perfect co-living matches.</p>
                </div>

                <div class="match-grid" id="matchGrid">
                    <!-- JS Injected -->
                </div>
            </main>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        const names = ['Alex', 'Sarah', 'Rohan', 'Priya', 'David', 'Emma', 'Liam', 'Olivia', 'James', 'Mia', 'Noah', 'Ava', 'Ethan', 'Isabella', 'Mason', 'Sophia', 'Logan', 'Amelia', 'Lucas', 'Harper'];
        const surnames = ['Johnson', 'Lee', 'Sharma', 'Patel', 'Smith', 'Wong', 'Garcia', 'Davis', 'Chen', 'Singh', 'Martinez', 'Brown', 'Wilson', 'Anderson', 'Taylor', 'Thomas', 'Moore', 'Jackson', 'Martin', 'White'];
        const roles = ['Software Engineer', 'Design Student', 'Marketing Lead', 'Architecture Student', 'Musician', 'Business Analyst', 'Freelancer', 'Medical Student', 'Photographer', 'Lawyer', 'Chef', 'Teacher', 'Nurse', 'Writer', 'Data Scientist'];
        const tagPool = ['Night Owl', 'Non-Smoker', 'Pet Lover', 'Early Bird', 'Clean-Freak', 'Vegan', 'Fitness Enthusiast', 'Bookworm', 'Coffee Addict', 'Gamer', 'Foodie', 'Quiet', 'Extrovert', 'Minimalist', 'Traveler', 'Artist', 'Musician', 'Techie'];

        const matches = [];
        
        // Base Premium Profiles
        matches.push({ id: 'm1', name: 'Alex Johnson', age: 24, percent: 98, role: 'Software Engineer', tags: ['Night Owl', 'Non-Smoker', 'Pet Lover'], img: 'https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=800&q=80' });
        matches.push({ id: 'm2', name: 'Sarah Lee', age: 22, percent: 97, role: 'Design Student', tags: ['Early Bird', 'Clean-Freak', 'Vegan'], img: 'https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=800&q=80' });
        matches.push({ id: 'm3', name: 'Rohan Sharma', age: 26, percent: 96, role: 'Marketing Lead', tags: ['Fitness Enthusiast', 'Non-Smoker'], img: 'https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=800&q=80' });
        matches.push({ id: 'm4', name: 'Priya Patel', age: 23, percent: 95, role: 'Architecture Student', tags: ['Quiet', 'Bookworm', 'Coffee Addict'], img: 'https://images.unsplash.com/photo-1517841905240-472988babdf9?w=800&q=80' });

        // Generate 36 more dynamic profiles to reach 40
        for(let i = 5; i <= 40; i++) {
            const fn = names[Math.floor(Math.random() * names.length)];
            const ln = surnames[Math.floor(Math.random() * surnames.length)];
            const role = roles[Math.floor(Math.random() * roles.length)];
            
            const numTags = 2 + Math.floor(Math.random() * 2);
            const tags = [];
            while(tags.length < numTags) {
                let tag = tagPool[Math.floor(Math.random() * tagPool.length)];
                if(!tags.includes(tag)) tags.push(tag);
            }
            
            const age = 20 + Math.floor(Math.random() * 10);
            const percent = 70 + Math.floor(Math.random() * 24); // generates 70-94% so base profiles stay at top
            
            const gender = Math.random() > 0.5 ? 'men' : 'women';
            const portraitId = Math.floor(Math.random() * 90) + 1;
            
            matches.push({
                id: 'm' + i,
                name: fn + ' ' + ln,
                age: age,
                percent: percent,
                role: role,
                tags: tags,
                // Highly stable avatar CDN fallback
                img: \`https://randomuser.me/api/portraits/\${gender}/\${portraitId}.jpg\`
            });
        }
        
        matches.sort((a, b) => b.percent - a.percent);

        document.addEventListener('DOMContentLoaded', () => {
            const usersStr = localStorage.getItem('1268_users');
            if(usersStr) {
                const users = JSON.parse(usersStr);
                const initial = users.current.name.charAt(0).toUpperCase();
                document.getElementById('navAvatar').innerText = initial;
            }

            const grid = document.getElementById('matchGrid');
            grid.innerHTML = matches.map(m => `
                <div class="match-card glass-panel" id="${m.id}">
                    <div class="match-img">
                        <img src="${m.img}" alt="${m.name}">
                        <div class="match-percent">${m.percent}% Match</div>
                    </div>
                    <div class="match-info">
                        <h3 style="font-size: 1.3rem; margin-bottom: 4px;">${m.name}, ${m.age}</h3>
                        <p style="color: var(--text-muted); font-size: 0.9rem;">${m.role}</p>
                        
                        <div class="match-tags">
                            ${m.tags.map(t => `<span class="match-tag">${t}</span>`).join('')}
                        </div>
                        
                        <button class="btn btn-outline" style="width: 100%; border-radius: 24px; padding: 12px;" onclick="connectMatch('${m.id}')">Connect Request</button>
                    </div>
                </div>
            `).join('');
        });

        window.connectMatch = function(id) {
            const btn = document.querySelector(`#${id} button`);
            btn.innerHTML = 'Request Sent ✓';
            btn.className = 'btn btn-primary';
            btn.disabled = true;
            btn.style.opacity = '0.8';
            if (typeof showToast === 'function') showToast("Connection request sent successfully!", "success");
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Srivachav STAY SAFE | Owner Hub</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background: #f0f2f5;
        }

        .owner-header {
            background: var(--text-main);
            color: white;
            padding: 80px 0 40px;
        }

        .tabs {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }

        .tab-btn {
            background: transparent;
            border: none;
            color: rgba(255,255,255,0.6);
            font-size: 1.1rem;
            padding: 10px 0;
            cursor: pointer;
            border-bottom: 2px solid transparent;
        }
        .tab-btn.active {
            color: white;
            border-bottom-color: var(--accent);
        }

        .dashboard-content {
            margin-top: -30px;
            position: relative;
            z-index: 10;
        }

        .kpi-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 24px;
            margin-bottom: 40px;
        }

        .kpi-card {
            background: var(--white);
            padding: 24px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-soft);
        }
        .kpi-card h3 { color: var(--text-muted); font-size: 1rem; font-weight: 500; margin-bottom: 8px; }
        .kpi-card h1 { font-size: 2.5rem; color: var(--text-main); }
        .kpi-card .trend { color: #48bb78; font-size: 0.9rem; margin-top: 8px; display: inline-block; background: rgba(72,187,120,0.1); padding: 4px 8px; border-radius: 20px;}

        /* CSS Chart */
        .chart-container {
            display: flex;
            align-items: flex-end;
            gap: 16px;
            height: 200px;
            margin-top: 20px;
            padding-bottom: 30px;
            border-bottom: 1px solid rgba(0,0,0,0.1);
        }

        .bar {
            flex: 1;
            background: linear-gradient(180deg, var(--primary), var(--primary-light));
            border-radius: 8px 8px 0 0;
            position: relative;
            transition: height 1s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .bar span {
            position: absolute;
            bottom: -25px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        /* Forms */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }

        .input-group {
            margin-bottom: 20px;
        }
        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--text-main);
        }
        .input-group input, .input-group select {
            width: 100%;
            padding: 14px;
            border: 1px solid rgba(0,0,0,0.1);
            border-radius: var(--radius-sm);
            font-size: 1rem;
            outline: none;
        }
        
        .upload-area {
            border: 2px dashed rgba(0,0,0,0.2);
            padding: 40px;
            text-align: center;
            border-radius: var(--radius-md);
            background: rgba(0,0,0,0.02);
            cursor: pointer;
            margin-bottom: 24px;
        }
    </style>
</head>
<body>
    <nav class="navbar" style="background: var(--text-main); border-bottom: 1px solid rgba(255,255,255,0.1);">
        <a href="index.html" class="nav-brand" style="color: white; -webkit-text-fill-color: initial;">STAY SAFE</a>
        <div class="nav-links">
            <a href="index.html" style="color: rgba(255,255,255,0.7);">Home</a>
            <a href="owner.html" style="color: white; font-weight: 600;">Owner Hub</a>
            <div class="profile-btn" style="background: rgba(255,255,255,0.2);">O</div>
        </div>
    </nav>

    <header class="owner-header">
        <div class="container">
            <h1>Partner Dashboard</h1>
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('overview')">Overview</button>
                <button class="tab-btn" onclick="switchTab('properties')">My Properties</button>
                <button class="tab-btn" onclick="switchTab('add')">Add New Listing</button>
            </div>
        </div>
    </header>

    <div class="container dashboard-content">
        <!-- Overview Tab -->
        <div id="tab-overview" class="tab-content">
            <div class="kpi-row">
                <div class="kpi-card">
                    <h3>Monthly Revenue</h3>
                    <h1>₹1,45,000</h1>
                    <div class="trend">↑ 12% vs last month</div>
                </div>
                <div class="kpi-card">
                    <h3>Active Tenants</h3>
                    <h1>18</h1>
                </div>
                <div class="kpi-card">
                    <h3>Total Listings</h3>
                    <h1 id="kpiListings">0</h1>
                </div>
                <div class="kpi-card">
                    <h3>Pending Requests</h3>
                    <h1 style="color: #dd6b20;">3</h1>
                </div>
            </div>

            <div class="glass-panel" style="padding: 30px; background: var(--white);">
                <div class="d-flex justify-between aligns-center">
                    <h2>Occupancy Analytics</h2>
                    <select style="padding: 8px; border-radius: 4px;"><option>Last 6 Months</option></select>
                </div>
                <div class="chart-container">
                    <div class="bar" style="height: 60%;"><span>Jan</span></div>
                    <div class="bar" style="height: 65%;"><span>Feb</span></div>
                    <div class="bar" style="height: 75%;"><span>Mar</span></div>
                    <div class="bar" style="height: 60%;"><span>Apr</span></div>
                    <div class="bar" style="height: 85%;"><span>May</span></div>
                    <div class="bar" style="height: 95%;"><span>Jun</span></div>
                </div>
            </div>
        </div>

        <!-- Add Property Tab -->
        <div id="tab-add" class="tab-content" style="display: none;">
            <div class="glass-panel" style="padding: 40px; background: var(--white);">
                <h2 style="margin-bottom: 30px;">Add New Property</h2>
                
                <div class="form-grid">
                    <div class="input-group">
                        <label>Property Name</label>
                        <input type="text" id="addName" placeholder="e.g. Skyline PG">
                    </div>
                    <div class="input-group">
                        <label>Location</label>
                        <input type="text" id="addLoc" placeholder="e.g. Bandra, Mumbai">
                    </div>
                    <div class="input-group">
                        <label>Property Type</label>
                        <select id="addType">
                            <option value="Co-living">Co-living</option>
                            <option value="Boys PG">Boys PG</option>
                            <option value="Girls PG">Girls PG</option>
                            <option value="Hostel">Hostel</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Monthly Rent (₹)</label>
                        <input type="number" id="addPrice" placeholder="5000">
                    </div>
                </div>

                <label for="realUpload" class="upload-area" style="display: block;">
                    <span style="font-size: 2rem;">UPLOAD</span>
                    <h3 style="margin-top: 10px;">Click to select an image</h3>
                    <p style="color: var(--text-muted); font-size: 0.9rem;">Upload a primary image of the room</p>
                    <input type="file" id="realUpload" accept="image/*" style="display: none;" onchange="handleImagePreview(this)">
                    <div id="previewContainer" style="margin-top: 20px; display: none;">
                        <img id="imagePreview" src="" style="max-width: 100%; max-height: 250px; border-radius: 8px; box-shadow: var(--shadow-soft); border: 2px solid var(--primary-light);">
                    </div>
                </label>

                <button class="btn btn-primary" style="padding: 16px 32px; font-size: 1.1rem;" onclick="submitProperty()">Publish Listing</button>
            </div>
        </div>

        <!-- Properties Tab -->
        <div id="tab-properties" class="tab-content" style="display: none;">
            <div class="glass-panel" style="padding: 30px; background: var(--white);">
                <h2 style="margin-bottom: 24px;">My Listings</h2>
                <div class="property-grid" id="ownerListings">
                    <!-- JS Injected -->
                </div>
            </div>
        </div>

    </div>

    <script src="script.js"></script>
    <script>
        function switchTab(tabId) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelector(`.tab-btn[onclick="switchTab('${tabId}')"]`).classList.add('active');

            document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
            document.getElementById(`tab-${tabId}`).style.display = 'block';

            if(tabId === 'properties') renderOwnerListings();
        }

        let uploadedImageData = null;

        function handleImagePreview(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = new Image();
                    img.onload = function() {
                        // Compress image to prevent localStorage quota from exceeding
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 600;
                        const scaleSize = MAX_WIDTH / img.width;
                        canvas.width = MAX_WIDTH;
                        canvas.height = img.height * scaleSize;

                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        
                        uploadedImageData = canvas.toDataURL('image/jpeg', 0.7); // 70% quality JPG
                        document.getElementById('imagePreview').src = uploadedImageData;
                        document.getElementById('previewContainer').style.display = 'block';
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function renderOwnerListings() {
            const props = getProperties();
            document.getElementById('kpiListings').innerText = props.length;

            const grid = document.getElementById('ownerListings');
            // Assuming ALL properties in the mock DB are "owned" by the user for this demo.
            grid.innerHTML = props.map(p => `
                <div class="property-card" style="border: 1px solid rgba(0,0,0,0.1); box-shadow: none;">
                    <div class="card-img" style="height: 150px;">
                        <img src="${p.images[0]}" alt="${p.name}">
                    </div>
                    <div class="card-content" style="padding: 16px;">
                        <div class="d-flex justify-between aligns-center">
                            <h3>${p.name}</h3>
                        </div>
                        <p class="location-text" style="font-size: 0.8rem; margin-bottom: 12px;"> ${p.location}</p>
                        <div class="d-flex justify-between aligns-center">
                            <span style="font-weight: 600; color: var(--primary);">${formatCurrency(p.price)}/mo</span>
                            <span class="badge badge-verified" style="font-size: 0.7rem;">Active</span>
                        </div>
                        <button class="btn btn-outline" onclick="deleteProperty('${p.id}')" style="width: 100%; margin-top: 16px; padding: 8px; border-color: #e53e3e; color: #e53e3e;">Remove Listing</button>
                    </div>
                </div>
            `).join('');
        }

        function submitProperty() {
            const name = document.getElementById('addName').value;
            const loc = document.getElementById('addLoc').value;
            const type = document.getElementById('addType').value;
            const price = document.getElementById('addPrice').value;

            if(!name || !loc || !price) {
                showToast("Please fill all fields", "error");
                return;
            }

            const newProp = {
                id: 'p' + Date.now(), // Generate random ID based on time
                name: name,
                type: type,
                price: parseInt(price),
                currency: "₹",
                location: loc,
                rating: 0,
                reviews: 0,
                amenities: ["WiFi"], // default
                images: [uploadedImageData || "https://images.unsplash.com/photo-1497366216548-37526070297c?w=800&q=80"], // uses real image if uploaded
                verified: false,
                highDemand: false,
                roomsLeft: 10,
                description: "Newly added property. Description pending."
            };

            let properties = getProperties();
            properties.unshift(newProp);
            localStorage.setItem('1268_properties', JSON.stringify(properties));

            showToast("Property Listing Published Successfully!");
            
            // clear form
            document.getElementById('addName').value = '';
            document.getElementById('addLoc').value = '';
            document.getElementById('addPrice').value = '';
            document.getElementById('realUpload').value = '';
            document.getElementById('previewContainer').style.display = 'none';
            uploadedImageData = null;

            // refresh count
            renderOwnerListings();

            // switch back to overview
            setTimeout(() => {
                switchTab('properties');
            }, 1000);
        }

        function deleteProperty(id) {
            if(!confirm("Are you sure you want to permanently remove this property listing?")) return;
            
            let properties = getProperties();
            properties = properties.filter(p => p.id !== id);
            localStorage.setItem('1268_properties', JSON.stringify(properties));
            
            if (typeof showToast !== 'undefined') showToast("Property listing removed successfully.");
            renderOwnerListings();
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderOwnerListings();
        });
    </script>
</body>
</html>
